name: Security Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

permissions: read-all

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # CODEQL — JavaScript + TypeScript
  # =========================================================
  codeql:
    name: CodeQL Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            back-end/package-lock.json
            front-end/package-lock.json

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Rodar CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          output: codeql-results

      - name: Checar severidade no SARIF do CodeQL
        shell: bash
        run: |
          SARIF_FILE=$(find codeql-results -name "*.sarif" | head -1)

          if [ -z "$SARIF_FILE" ]; then
            echo "⚠️ Nenhum arquivo SARIF encontrado"
            exit 1
          fi

          COUNT=$(jq '
            [
              .runs[].results[]? as $result |
              (
                .runs[].tool.driver.rules[]?,
                .runs[].tool.extensions[]?.rules[]?
              ) |
              select(.id == $result.ruleId) |
              (.properties["security-severity"] // "0") |
              tonumber |
              select(. >= 7.0)
            ] | length
          ' "$SARIF_FILE")

          echo "⚠️ Alertas High/Critical encontrados: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ CodeQL encontrou $COUNT vulnerabilidade(s) High/Critical"
            jq -r '
              .runs[].results[]? as $result |
              (
                .runs[].tool.driver.rules[]?,
                .runs[].tool.extensions[]?.rules[]?
              ) |
              select(.id == $result.ruleId) |
              "\(.properties["security-severity"] // "?") | \($result.ruleId) | \($result.message.text)"
            ' "$SARIF_FILE"
            exit 1
          fi

          echo "✅ Nenhuma vulnerabilidade High/Critical encontrada"

  # =========================================================
  # SECURITY ANALYSIS — SCA + SAST + Secrets + Sonar
  # =========================================================
  security:
    name: Security Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    timeout-minutes: 30

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================
      # SETUP
      # =====================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            back-end/package-lock.json
            front-end/package-lock.json

      # =====================================================
      # CACHE
      # =====================================================
      - name: Cache node_modules (back-end)
        uses: actions/cache@v4
        with:
          path: ./back-end/node_modules
          key: ${{ runner.os }}-back-${{ hashFiles('back-end/package-lock.json') }}
          restore-keys: ${{ runner.os }}-back-

      - name: Cache node_modules (front-end)
        uses: actions/cache@v4
        with:
          path: ./front-end/node_modules
          key: ${{ runner.os }}-front-${{ hashFiles('front-end/package-lock.json') }}
          restore-keys: ${{ runner.os }}-front-

      # =====================================================
      # INSTALL
      # =====================================================
      - name: Instalar dependências (back-end)
        working-directory: ./back-end
        run: npm ci

      - name: Instalar dependências (front-end)
        working-directory: ./front-end
        run: npm ci

      # =====================================================
      # TESTS COM COVERAGE
      # =====================================================
      - name: Rodar testes com coverage (back-end)
        continue-on-error: true
        working-directory: ./back-end
        run: npm run test:cov

      # =====================================================
      # SCA — npm audit
      # =====================================================
      - name: npm audit (back-end)
        id: audit_back
        continue-on-error: true
        working-directory: ./back-end
        run: npm audit --audit-level=high

      - name: npm audit (front-end)
        id: audit_front
        continue-on-error: true
        working-directory: ./front-end
        run: npm audit --audit-level=high

      # =====================================================
      # SCA — Trivy filesystem (cobre OS-level + libs)
      # =====================================================
      - name: Trivy filesystem scan
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: node_modules,.next,dist,coverage

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # =====================================================
      # SEMGREP — OWASP + Node/Express + TypeScript
      # =====================================================
      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/typescript" \
            --config "p/javascript" \
            --config "p/nodejsscan" \
            --config "p/expressjs" \
            --config "p/react" \
            --config "p/secrets" \
            --sarif \
            --output=semgrep.sarif \
            --timeout=120 \
            --exclude="**/node_modules/**" \
            --exclude="**/.next/**" \
            --exclude="**/dist/**" \
            --exclude="**/coverage/**" \
            --error
          echo "semgrep_generated=$(test -f semgrep.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Upload Semgrep SARIF
        if: always() && steps.semgrep.outputs.semgrep_generated == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # =====================================================
      # SECRET SCANNING — Gitleaks (action oficial)
      # =====================================================
      - name: Gitleaks Scan
        id: gitleaks
        continue-on-error: true
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect \
            --source . \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0
          echo "gitleaks_generated=$(test -f gitleaks.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      # =====================================================
      # PRISMA — valida schema antes de qualquer coisa quebrar em prod
      # =====================================================
      - name: Validar Prisma schema
        id: prisma
        continue-on-error: true
        working-directory: ./back-end
        run: npx prisma validate

      # =====================================================
      # SBOM — CycloneDX (back-end + front-end)
      # =====================================================
      - name: Gerar SBOM
        id: sbom
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM artifact
        if: always() && hashFiles('sbom.cdx.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30

      # =====================================================
      # SONARCLOUD
      # =====================================================
      - name: SonarCloud Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=fabrica-bayarea_Sprint-Tracker
            -Dsonar.organization=fabrica-bayarea
            -Dsonar.sources=back-end/src,front-end/app,front-end/components,front-end/lib
            -Dsonar.tests=back-end/test
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/prisma/migrations/**,**/*.d.ts
            -Dsonar.coverage.exclusions=front-end/**,**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/main.ts,**/*.module.ts,**/*.dto.ts,**/prisma/**,**/*.gateway.ts,**/*.guard.ts,**/*.strategy.ts,**/*.middleware.ts,**/*.decorator.ts,**/decorators/**,**/health/**,**/interface/**,**/analysis/**,**/email/**,**/auth/**,back-end/src/types/**,back-end/src/common/**,back-end/src/utils/**
            -Dsonar.javascript.lcov.reportPaths=back-end/coverage/lcov.info
            -Dsonar.qualitygate.wait=true

      # =====================================================
      # DEPENDENCY REVIEW — só em PRs
      # =====================================================
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      # =====================================================
      # FINAL SECURITY GATE
      # failure  → bloqueia o pipeline
      # skipped  → aviso, não bloqueia
      # =====================================================
      - name: Security Gate
        if: always()
        shell: bash
        run: |
          FAILED=0

          check_step() {
            local name=$1
            local outcome=$2
            local blocking=$3   # "block" ou "warn"

            if [ "$outcome" = "failure" ]; then
              if [ "$blocking" = "block" ]; then
                echo "❌ $name failed (BLOCKING)"
                FAILED=1
              else
                echo "⚠️  $name failed (warning only)"
              fi
            elif [ "$outcome" = "skipped" ]; then
              echo "⚠️  $name was skipped"
            else
              echo "✅ $name: $outcome"
            fi
          }

          # Bloqueantes
          check_step "Semgrep"       "${{ steps.semgrep.outcome }}"     "block"
          check_step "SonarCloud"    "${{ steps.sonar.outcome }}"       "block"
          check_step "Gitleaks"      "${{ steps.gitleaks.outcome }}"    "block"
          check_step "Prisma"        "${{ steps.prisma.outcome }}"      "block"

          # Não-bloqueantes (warnings)
          check_step "Trivy FS"      "${{ steps.trivy_fs.outcome }}"    "warn"
          check_step "npm audit BE"  "${{ steps.audit_back.outcome }}"  "warn"
          check_step "npm audit FE"  "${{ steps.audit_front.outcome }}" "warn"
          check_step "SBOM"          "${{ steps.sbom.outcome }}"        "warn"

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Security pipeline FAILED — revise os achados acima"
            exit 1
          fi

          echo "✅ Security pipeline APPROVED"