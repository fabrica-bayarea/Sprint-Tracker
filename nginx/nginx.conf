events {
  worker_connections 1024;
}

http {
  server_tokens off;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "SAMEORIGIN";

  proxy_hide_header X-Powered-By;
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # Allowlist apenas Upgrade: websocket. Bloqueia H2C smuggling
  # (Upgrade: h2c) e demais valores arbitrários enviados pelo cliente.
  map $http_upgrade $connection_upgrade {
    default     "";
    websocket   "upgrade";
  }

  map $http_upgrade $upgrade_safe {
    default     "";
    websocket   $http_upgrade;
  }

  upstream api {
    server sprinttacker-api:3000;
  }

  upstream webui {
    server sprinttacker-webui:3000;
  }

  server {
    listen 80;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    location /api/ {
      proxy_pass http://api/;
      # $proxy_host evita host-header injection (CodeQL/Semgrep request-host-used)
      proxy_set_header Host $proxy_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_intercept_errors off;

      proxy_http_version 1.1;
      # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
      # Justificativa: o map $http_upgrade $upgrade_safe acima já faz allowlist
      # apenas para "websocket"; qualquer outro valor (incluindo h2c) vira string
      # vazia, mitigando H2C smuggling. Semgrep não interpreta a indireção do map.
      proxy_set_header Upgrade $upgrade_safe;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      proxy_pass http://webui;
      proxy_set_header Host $proxy_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_intercept_errors off;

      proxy_http_version 1.1;
      # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
      # Mesma mitigação via map (vide bloco /api/).
      proxy_set_header Upgrade $upgrade_safe;
      proxy_set_header Connection $connection_upgrade;
    }

    location ~* \.(env|log|bak|sql)$ {
      deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
  }
}
